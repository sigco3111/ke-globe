<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<title>Simple Test</title></head><body>
<h1>KE-GLOBE — 핵실험 타임라인</h1>
<button id="playBtn">▶ 자동 재생</button>
<div>연도: <span id="yearLabel">1945</span></div>
<input type="range" id="yearSlider" min="1945" max="2024" value="1945" />
<div>전체: <b id="total-count">0</b>회 | 표시중: <b id="visible-count">0</b>개</div>
<script type="module">
import { nuclearTests } from '/src/nuclearData.js'

const yearSlider = document.getElementById('yearSlider')
const yearLabel  = document.getElementById('yearLabel')
const playBtn    = document.getElementById('playBtn')
const totalCount = document.getElementById('total-count')
const visibleCount = document.getElementById('visible-count')

totalCount.textContent = nuclearTests.length
let currentYear = 1945

function updateVisibility(year) {
  currentYear = year
  const visible = nuclearTests.filter(t => t.year <= year)
  yearLabel.textContent = year
  visibleCount.textContent = visible.length
  console.log('updateVisibility', year, '→ visible:', visible.length)
}

yearSlider.addEventListener('input', e => {
  console.log('slider event! value:', e.target.value)
  updateVisibility(parseInt(e.target.value, 10))
})

playBtn.addEventListener('click', () => {
  console.log('play clicked')
  updateVisibility(parseInt(yearSlider.value, 10) + 1)
})

updateVisibility(1945)
console.log('Script loaded, nuclearTests:', nuclearTests.length)
</script>
</body></html>
